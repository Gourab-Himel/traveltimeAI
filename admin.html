<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TravelTime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/modern.css">
    <style>
        body {
            padding-top: 50px;
        }

        .admin-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 class="mb-4">Admin Dashboard</h2>

        <div class="row">
            <!-- Add Trip Form -->
            <div class="col-md-5 mb-4">
                <div class="admin-card">
                    <h4 class="mb-3">Add New Trip</h4>
                    <form id="add-trip-form">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" class="form-control" id="title" required>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select class="form-control" id="category">
                                <option value="package">Package</option>
                                <option value="hotel">Hotel</option>
                                <option value="flight">Flight</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price</label>
                            <input type="number" class="form-control" id="price" required>
                        </div>
                        <div class="row">
                            <div class="col-6">
                                <div class="form-group">
                                    <label>Start Date</label>
                                    <input type="date" class="form-control" id="startDate" required>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="form-group">
                                    <label>End Date</label>
                                    <input type="date" class="form-control" id="endDate" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Image URL</label>
                            <input type="text" class="form-control" id="image" placeholder="images/img_1.jpg"
                                value="images/img_1.jpg">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="description" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Add Trip</button>
                        <div id="msg" class="mt-2 text-center"></div>
                    </form>
                </div>
            </div>

            <!-- Trips List -->
            <div class="col-md-7">
                <div class="admin-card">
                    <h4 class="mb-3">Existing Trips</h4>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Dates</th>
                                    <th>Price</th>
                                </tr>
                            </thead>
                            <tbody id="trips-table-body">
                                <!-- Dynamic Content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/data-store.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Security Check
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'admin') {
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadTrips();

            document.getElementById('add-trip-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    title: document.getElementById('title').value,
                    category: document.getElementById('category').value,
                    price: document.getElementById('price').value,
                    startDate: document.getElementById('startDate').value,
                    endDate: document.getElementById('endDate').value,
                    image: document.getElementById('image').value,
                    description: document.getElementById('description').value
                };

                // Hybrid: Try API, Fallback to Local
                try {
                    const method = editingTripId ? 'PUT' : 'POST';
                    const url = editingTripId ? `/api/trips/${editingTripId}` : '/api/trips';

                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (res.ok) {
                        // Success from API
                        editingTripId = null;
                        document.querySelector('button[type="submit"]').textContent = 'Add Trip';
                    } else {
                        throw new Error('API Error');
                    }
                } catch (e) {
                    // Fallback
                    if (typeof DataStore !== 'undefined') {
                        if (editingTripId) { /* Mock Update not impl */ }
                        else DataStore.addTrip(data);
                    }
                }

                // Always show success in this prototype
                document.getElementById('msg').innerHTML = '<span class="text-success">Trip Added!</span>';
                document.getElementById('add-trip-form').reset();
                loadTrips();
            });
        });

        async function loadTrips() {
            let trips = [];
            try {
                const res = await fetch('/api/trips');
                if (!res.ok) throw new Error('API Error');
                trips = await res.json();
            } catch (e) {
                if (typeof DataStore !== 'undefined') {
                    trips = DataStore.getTrips();
                }
            }

            const tbody = document.getElementById('trips-table-body');
            tbody.innerHTML = '';
            trips.forEach(t => {
                tbody.innerHTML += `
                    <tr>
                        <td>${t.id}</td>
                        <td>${t.title}</td>
                        <td>${t.category}</td>
                        <td>${t.startDate} - ${t.endDate}</td>
                        <td>${t.startDate} - ${t.endDate}</td>
                        <td>${'৳' + Number(t.price).toLocaleString('en-BD')}</td>
                        <td>
                            <button class="btn btn-warning btn-sm mr-2" onclick="editTrip(${t.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteTrip(${t.id})">Delete</button>
                        </td>
                    </tr>`;
            });
        }

        let editingTripId = null;

        async function editTrip(id) {
            try {
                const res = await fetch(`/api/trips/${id}`);
                const trip = await res.json();

                document.getElementById('title').value = trip.title;
                document.getElementById('category').value = trip.category;
                document.getElementById('price').value = trip.price;
                document.getElementById('startDate').value = trip.startDate;
                document.getElementById('endDate').value = trip.endDate;
                document.getElementById('image').value = trip.image;
                document.getElementById('description').value = trip.description;

                editingTripId = id;
                document.querySelector('button[type="submit"]').textContent = 'Update Trip';
                window.scrollTo(0, 0);
            } catch (e) { console.error(e); }
        }

        async function deleteTrip(id) {
            if (!confirm('Are you sure you want to delete this trip?')) return;

            try {
                const res = await fetch(`/api/trips/${id}`, { method: 'DELETE' });
                // If API works or if we are in fallback, we update UI
                loadTrips();
            } catch (e) {
                console.error(e);
                alert('Connection error');
            }
        }
    </script>

</body>

</html>
